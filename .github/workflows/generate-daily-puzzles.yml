name: Generate Daily Puzzles

# Disabled — puzzles are now pre-generated locally via `npm run generate-pool`
# and committed to public/puzzle-pool.json. Re-enable if switching back to
# server-side generation.
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Defaults to tomorrow.'
        required: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate puzzles
        run: npx vite-node scripts/generate-daily-puzzles.ts ${{ github.event.inputs.date }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated puzzles
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/daily-puzzles.json
          PUZZLE_DATE=$(node -e "process.stdout.write(require('./public/daily-puzzles.json').date)")
          git diff --staged --quiet || git commit -m "Daily puzzles for ${PUZZLE_DATE}"
          git push
