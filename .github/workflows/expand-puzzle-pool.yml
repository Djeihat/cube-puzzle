name: Expand Puzzle Pool

on:
  schedule:
    # First day of each month at 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Expand pool
        run: npx vite-node scripts/generate-puzzle-pool.ts

      - name: Commit if pool grew
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/puzzle-pool.json
          EASY=$(node -e "process.stdout.write(String(require('./public/puzzle-pool.json').easy.length))")
          MED=$(node  -e "process.stdout.write(String(require('./public/puzzle-pool.json').medium.length))")
          HARD=$(node -e "process.stdout.write(String(require('./public/puzzle-pool.json').hard.length))")
          git diff --staged --quiet || git commit -m "Expand puzzle pool: ${EASY}e / ${MED}m / ${HARD}h"
          git push
